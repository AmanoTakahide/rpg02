<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タマ狩りRPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <canvas id="gameCanvas" width="320" height="320"></canvas>

        <div class="controls">
            <div class="d-pad">
                <button class="btn" id="btn-up">▲</button>
                <div class="d-pad-horizontal">
                    <button class="btn" id="btn-left">◀</button>
                    <button class="btn" id="btn-right">▶</button>
                </div>
                <button class="btn" id="btn-down">▼</button>
            </div>

            <div class="system-buttons">
                <button class="btn system-btn" id="btn-start">START</button>
            </div>

            <div class="action-buttons">
                <button class="btn action-btn" id="btn-b">B</button>
                <button class="btn action-btn" id="btn-a">A</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
